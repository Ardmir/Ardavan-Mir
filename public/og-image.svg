<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none" role="img" aria-label="Ardavan Mirhosseini  Senior Product Designer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05070a"/>
      <stop offset="1" stop-color="#111719"/>
    </linearGradient>
    <linearGradient id="glow" x1="760" y1="120" x2="1120" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#31f5d4" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#31f5d4" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="680" y="40" width="480" height="550" rx="24" fill="url(#glow)"/>

  <!-- Abstract legibility motif -->
  <g opacity="0.9">
    <line x1="820" y1="180" x2="980" y2="140" stroke="#31f5d4" stroke-width="1.5" stroke-opacity="0.45"/>
    <line x1="980" y1="140" x2="1080" y2="220" stroke="#31f5d4" stroke-width="1.5" stroke-opacity="0.35"/>
    <line x1="820" y1="180" x2="860" y2="320" stroke="#31f5d4" stroke-width="1.5" stroke-opacity="0.4"/>
    <line x1="860" y1="320" x2="1020" y2="360" stroke="#31f5d4" stroke-width="1.5" stroke-opacity="0.35"/>
    <line x1="1020" y1="360" x2="1080" y2="220" stroke="#31f5d4" stroke-width="1.5" stroke-opacity="0.3"/>
    <line x1="860" y1="320" x2="900" y2="470" stroke="#31f5d4" stroke-width="1.5" stroke-opacity="0.28"/>
    <line x1="900" y1="470" x2="1040" y2="500" stroke="#31f5d4" stroke-width="1.5" stroke-opacity="0.25"/>
    <line x1="1040" y1="500" x2="1020" y2="360" stroke="#31f5d4" stroke-width="1.5" stroke-opacity="0.22"/>

    <circle cx="820" cy="180" r="7" fill="#31f5d4" fill-opacity="0.85"/>
    <circle cx="980" cy="140" r="5" fill="#f4f7f6" fill-opacity="0.55"/>
    <circle cx="1080" cy="220" r="6" fill="#31f5d4" fill-opacity="0.7"/>
    <circle cx="860" cy="320" r="8" fill="#f4f7f6" fill-opacity="0.45"/>
    <circle cx="1020" cy="360" r="5" fill="#31f5d4" fill-opacity="0.65"/>
    <circle cx="900" cy="470" r="6" fill="#f4f7f6" fill-opacity="0.4"/>
    <circle cx="1040" cy="500" r="4" fill="#ff9a8a" fill-opacity="0.75"/>

    <rect x="760" y="250" width="120" height="72" rx="10" stroke="#31f5d4" stroke-width="1.25" stroke-opacity="0.22" fill="#111719" fill-opacity="0.55"/>
    <rect x="1110" y="390" width="56" height="56" rx="8" stroke="#31f5d4" stroke-width="1" stroke-opacity="0.18" fill="#111719" fill-opacity="0.45"/>
  </g>

  <!-- Accent rule -->
  <rect x="88" y="248" width="72" height="3" rx="1.5" fill="#31f5d4"/>

  <!-- Copy -->
  <text x="88" y="118" fill="#f4f7f6" font-family="Georgia, 'Times New Roman', serif" font-size="54" font-weight="400" letter-spacing="-0.5">Ardavan Mirhosseini</text>
  <text x="88" y="178" fill="#a8b3b0" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="300" letter-spacing="0.2">Senior Product Designer</text>
  <text x="88" y="318" fill="#31f5d4" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="400" letter-spacing="0.1">AI-native enterprise products</text>
  <text x="88" y="372" fill="#f4f7f6" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="300" letter-spacing="0.1">Financial complexity made legible</text>

  <!-- Subtle footer mark -->
  <text x="88" y="560" fill="#5e6865" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="400" letter-spacing="0.35">ardavanmir.com</text>
</svg>
